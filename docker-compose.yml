version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finmate-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finmate
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finmate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ---- FundLens ----
  fundlens-scraper:
    build:
      context: ./apps/fundlens-scraper
      dockerfile: Dockerfile
    container_name: finmate-fundlens-scraper
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      FUNDLENS_DATABASE_URL: postgresql://postgres:password@postgres:5432/finmate
      FUNDLENS_REDIS_URL: redis://redis:6379/0
      FUNDLENS_LOG_LEVEL: INFO
      FUNDLENS_HTTP_PORT: "8001"
    depends_on:
      - postgres
      - redis
    profiles:
      - fundlens

  fundlens-celery-worker:
    build:
      context: ./apps/fundlens-scraper
      dockerfile: Dockerfile
    container_name: finmate-fundlens-celery
    restart: unless-stopped
    command: ["celery", "-A", "fundlens_scraper.celery_app", "worker", "--loglevel=info"]
    environment:
      FUNDLENS_DATABASE_URL: postgresql://postgres:password@postgres:5432/finmate
      FUNDLENS_REDIS_URL: redis://redis:6379/0
      FUNDLENS_LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
      - fundlens-scraper
    profiles:
      - fundlens

  fundlens-api:
    build:
      context: ./apps/fundlens-api
      dockerfile: Dockerfile
    container_name: finmate-fundlens-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FUNDLENS_API_PORT: "5000"
      FUNDLENS_DATABASE_URL: postgresql://postgres:password@postgres:5432/finmate
      FUNDLENS_REDIS_URL: redis://redis:6379/0
      FUNDLENS_FRONTEND_URL: http://localhost:3000
      FUNDLENS_LOG_LEVEL: info
    depends_on:
      - postgres
      - redis
    profiles:
      - fundlens

  # Commenting out arena services for now - they need shared packages
  # To run them, use: pnpm dev (which runs them locally with access to monorepo)
  
  # arena-market-simulator:
  #   build: ./apps/arena-market-simulator
