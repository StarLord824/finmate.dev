services:
  # ── Backend API (Web Service — has /health for uptime ping) ────────────────
  - type: web
    name: finmate-api
    runtime: docker
    dockerfilePath: apps/backend-api/Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Ingestion Worker (Background Worker — no HTTP, runs 24/7) ──────────────
  - type: worker
    name: finmate-ingestion
    runtime: docker
    dockerfilePath: apps/ingestion-worker/Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # ── Enrichment Worker (Background Worker — queue consumer, runs 24/7) ──────
  - type: worker
    name: finmate-enrichment
    runtime: docker
    dockerfilePath: apps/enrichment-worker/Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
